name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------
  # Lint & Format
  # -------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: uv pip install -e ".[lint]"
    - name: Check formatting with ruff
      run: uv run ruff format --check .
    - name: Lint with ruff
      run: uv run ruff check .

  # -------------------------------------------------------------------
  # Pre-commit hooks
  # -------------------------------------------------------------------
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
      with:
        python-version: "3.12"
    - name: Install pre-commit
      run: uv pip install pre-commit
    - name: Run pre-commit on all files
      run: uv run pre-commit run --all-files

  # -------------------------------------------------------------------
  # Unit tests + Coverage (multi-version, multi-OS matrix)
  # -------------------------------------------------------------------
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        exclude:
          # Keep matrix manageable: only test oldest + newest on macOS
          - os: macos-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.12"
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: uv pip install -e ".[dev,lint]"
    - name: Run tests with coverage
      run: |
        uv run pytest --cov --junitxml=junit.xml -o junit_family=legacy
    - name: Upload coverage reports to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        report_type: test_results

  # -------------------------------------------------------------------
  # Type checking with mypy
  # -------------------------------------------------------------------
  typecheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: uv pip install -e ".[dev,lint]"
    - name: Run mypy
      run: uv run python -m mypy src/pywrkr/ --ignore-missing-imports --disable-error-code import-untyped

  # -------------------------------------------------------------------
  # Security scanning
  # -------------------------------------------------------------------
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: uv pip install -e ".[security]"
    - name: Run bandit (security linter)
      run: uv run python -m bandit -r src/pywrkr/ -c pyproject.toml
    - name: Run pip-audit (dependency vulnerabilities)
      run: uv run python -m pip_audit
