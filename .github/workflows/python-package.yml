name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------
  # Lint & Format
  # -------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: pip
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e ".[lint]"
    - name: Check formatting with ruff
      run: ruff format --check .
    - name: Lint with ruff
      run: ruff check .

  # -------------------------------------------------------------------
  # Pre-commit hooks
  # -------------------------------------------------------------------
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: pip
    - name: Install pre-commit
      run: python -m pip install pre-commit
    - name: Run pre-commit on all files
      run: pre-commit run --all-files

  # -------------------------------------------------------------------
  # Unit tests + Coverage (multi-version, multi-OS matrix)
  # -------------------------------------------------------------------
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        exclude:
          # Keep matrix manageable: only test oldest + newest on macOS
          - os: macos-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.12"
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e ".[dev,lint]"
    - name: Run tests with coverage
      run: |
        pytest --cov=pywrkr --cov-report=xml --cov-report=term-missing --cov-fail-under=85
    - name: Upload coverage reports to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

  # -------------------------------------------------------------------
  # Type checking with mypy
  # -------------------------------------------------------------------
  typecheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: pip
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e ".[dev,lint]"
    - name: Run mypy
      run: python -m mypy src/pywrkr/ --ignore-missing-imports --disable-error-code import-untyped

  # -------------------------------------------------------------------
  # Security scanning
  # -------------------------------------------------------------------
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: pip
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e ".[security]"
    - name: Run bandit (security linter)
      run: python -m bandit -r src/pywrkr/ -c pyproject.toml
    - name: Run pip-audit (dependency vulnerabilities)
      run: python -m pip_audit
